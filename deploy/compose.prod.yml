# ============================================================
# ez_TheMentalLoad — Production Compose (ez_testbench target)
# ============================================================
# Follows the EZ Testbench Deployment Rules (Deployment_rules/)
#
# Before first use on the server:
#   cp deploy/.env.production.example deploy/.env.production
#   # Edit deploy/.env.production and fill in all CHANGE_ME values
#
# To deploy / update:
#   ./deploy/deploy.sh
#
# Networks
#   mentalload_internal  — private bridge; postgres, redis, ollama, backend, worker
#   ez_testbench_proxy   — external; Traefik routes frontend via BASE_DOMAIN
# ============================================================

services:

  # ── Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ez-mentalload-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: mental_load
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_ME}
    volumes:
      - mentalload_postgres_data:/var/lib/postgresql/data
    networks:
      - mentalload_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d mental_load"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Cache / Queue ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ez-mentalload-redis
    restart: unless-stopped
    volumes:
      - mentalload_redis_data:/data
    networks:
      - mentalload_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ── AI / Ollama ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.5
    container_name: ez-mentalload-ollama
    restart: unless-stopped
    volumes:
      - mentalload_ollama_data:/root/.ollama
    networks:
      - mentalload_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M

  ollama-init:
    image: ollama/ollama:0.6.5
    container_name: ez-mentalload-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "llama3.2:3b"]
    restart: on-failure
    networks:
      - mentalload_internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    image: ez-mentalload-backend:local
    container_name: ez-mentalload-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env.production
    environment:
      PORT: 3000
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-CHANGE_ME}@postgres:5432/mental_load
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      NODE_ENV: production
    networks:
      - mentalload_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Reminder Worker ───────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    image: ez-mentalload-backend:local
    container_name: ez-mentalload-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-CHANGE_ME}@postgres:5432/mental_load
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    command: ["npm", "--workspace", "@mental-load/backend", "run", "start:worker"]
    networks:
      - mentalload_internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: packages/frontend/Dockerfile
      args:
        # ws:// for plain HTTP Traefik; change to wss:// once you add TLS
        NEXT_PUBLIC_WS_URL: ws://mentalload.${BASE_DOMAIN:-localhost}/ws
    image: ez-mentalload-frontend:local
    container_name: ez-mentalload-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_WS_URL: ws://mentalload.${BASE_DOMAIN:-localhost}/ws
    networks:
      - mentalload_internal
      - ez_testbench_proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.mentalload.rule=Host(`mentalload.${BASE_DOMAIN:-localhost}`)
      - traefik.http.routers.mentalload.entrypoints=web
      - traefik.http.services.mentalload.loadbalancer.server.port=4173
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

# ── Volumes ────────────────────────────────────────────────
volumes:
  mentalload_postgres_data:
  mentalload_redis_data:
  mentalload_ollama_data:

# ── Networks ───────────────────────────────────────────────
networks:
  mentalload_internal:
    driver: bridge
  ez_testbench_proxy:
    external: true   # Must already exist — created by ez_testbench core
