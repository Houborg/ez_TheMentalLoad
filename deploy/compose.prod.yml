# ============================================================
# ez_TheMentalLoad — Production Compose (Testbench / Cloudflare Tunnel)
# ============================================================
# Routing: Cloudflare Tunnel (NOT Traefik).
#   - All services join the external `testbench` Docker network.
#   - Tunnel ingress: mentalload.pl0k.online → http://mentalload-frontend:4173
#   - No Traefik labels needed.
#
# Build context is the absolute path on the server.
# Env vars are set inline — no .env file required.
#
# Deploy via Testbench UI → Managed Apps → mentalload → Redeploy
# Or manually:
#   docker compose -f /home/mhouborg/testbench/TestBench/data/apps/mentalload/docker-compose.yml \
#     -p mentalload up -d --build --remove-orphans
# ============================================================

services:

  # ── Database ──────────────────────────────────────────────
  mentalload-postgres:
    image: postgres:16-alpine
    container_name: mentalload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mental_load
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - mentalload_postgres_data:/var/lib/postgresql/data
    networks:
      - testbench
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mental_load"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Cache / Queue ─────────────────────────────────────────
  mentalload-redis:
    image: redis:7-alpine
    container_name: mentalload-redis
    restart: unless-stopped
    volumes:
      - mentalload_redis_data:/data
    networks:
      - testbench
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ── AI / Ollama ───────────────────────────────────────────
  mentalload-ollama:
    image: ollama/ollama:0.6.5
    container_name: mentalload-ollama
    restart: unless-stopped
    volumes:
      - mentalload_ollama_data:/root/.ollama
    networks:
      - testbench
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/11434"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M

  mentalload-ollama-init:
    image: ollama/ollama:0.6.5
    container_name: mentalload-ollama-init
    depends_on:
      mentalload-ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://mentalload-ollama:11434
    command: ["pull", "llama3.2:3b"]
    restart: on-failure
    networks:
      - testbench
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Backend API ───────────────────────────────────────────
  mentalload-backend:
    build:
      context: /home/mhouborg/ez_TheMentalLoad
      dockerfile: packages/backend/Dockerfile
    image: mentalload-backend:local
    container_name: mentalload-backend
    restart: unless-stopped
    depends_on:
      mentalload-postgres:
        condition: service_healthy
      mentalload-redis:
        condition: service_healthy
      mentalload-ollama:
        condition: service_started
    environment:
      PORT: "3000"
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@mentalload-postgres:5432/mental_load
      REDIS_URL: redis://mentalload-redis:6379
      OLLAMA_URL: http://mentalload-ollama:11434
      SMTP_HOST: smtp.simply.dk
      SMTP_PORT: "587"
      DEFAULT_TIMEZONE: Europe/Copenhagen
      NODE_ENV: production
    networks:
      - testbench
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Reminder Worker ───────────────────────────────────────
  mentalload-worker:
    build:
      context: /home/mhouborg/ez_TheMentalLoad
      dockerfile: packages/backend/Dockerfile
    image: mentalload-backend:local
    container_name: mentalload-worker
    restart: unless-stopped
    depends_on:
      mentalload-postgres:
        condition: service_healthy
      mentalload-redis:
        condition: service_healthy
    environment:
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@mentalload-postgres:5432/mental_load
      REDIS_URL: redis://mentalload-redis:6379
      SMTP_HOST: smtp.simply.dk
      SMTP_PORT: "587"
      DEFAULT_TIMEZONE: Europe/Copenhagen
      NODE_ENV: production
    command: ["npm", "--workspace", "@mental-load/backend", "run", "start:worker"]
    networks:
      - testbench
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ── Frontend ──────────────────────────────────────────────
  mentalload-frontend:
    build:
      context: /home/mhouborg/ez_TheMentalLoad
      dockerfile: packages/frontend/Dockerfile
      args:
        # Compiled into the client bundle at build time — must be wss:// on HTTPS
        NEXT_PUBLIC_WS_URL: wss://mentalload.pl0k.online/ws
        BUILD_VERSION: ${BUILD_VERSION:-0.0.0}
        BUILD_COMMIT: ${BUILD_COMMIT:-local}
        BUILD_TIME: ${BUILD_TIME:-}
    image: mentalload-frontend:local
    container_name: mentalload-frontend
    restart: unless-stopped
    depends_on:
      mentalload-backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://mentalload-backend:3000
      NEXT_PUBLIC_WS_URL: ""
    ports:
      - "4173:4173"
    networks:
      - testbench
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

# ── Volumes ────────────────────────────────────────────────
volumes:
  mentalload_postgres_data:
  mentalload_redis_data:
  mentalload_ollama_data:

# ── Networks ───────────────────────────────────────────────
networks:
  testbench:
    external: true   # Created by Testbench core; cloudflared lives here
