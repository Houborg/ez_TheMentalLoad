services:
  postgres:
    image: postgres:16-alpine
    container_name: mentalload-postgres
    environment:
      POSTGRES_DB: mental_load
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mental_load"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mentalload-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: mentalload-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  ollama:
    image: ollama/ollama:latest
    container_name: mentalload-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: mentalload-ollama-init
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "llama3.2:3b"]
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: mentalload-backend
    depends_on:
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      PORT: 3000
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mental_load
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      OLLAMA_URL: http://ollama:11434
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: mentalload-worker
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mental_load
      REDIS_URL: redis://redis:6379
      DEFAULT_TIMEZONE: Europe/Copenhagen
    command: ["npm", "--workspace", "@mental-load/backend", "run", "start:worker"]

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: mentalload-frontend
    depends_on:
      - backend
    ports:
      - "4173:4173"
    environment:
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3000/ws

volumes:
  postgres_data:
  ollama_data:
