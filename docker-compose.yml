services:
  postgres:
    image: postgres:16-alpine
    container_name: mentalload-postgres
    environment:
      POSTGRES_DB: mental_load
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mental_load"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mentalload-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: mentalload-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  ollama:
    image: ollama/ollama:latest
    container_name: mentalload-ollama
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: mentalload-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      PORT: 3000
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mental_load
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      OLLAMA_URL: http://ollama:11434
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: mentalload-worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      PERSISTENCE_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mental_load
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    command: ["npm", "--workspace", "@mental-load/backend", "run", "start:worker"]

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: mentalload-frontend
    depends_on:
      - backend
    ports:
      - "4173:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173

volumes:
  postgres_data:
  ollama_data:
